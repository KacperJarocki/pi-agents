name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'images/**'
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image to build (gateway-api, collector, ml-pipeline, dashboard)'
        required: false
        type: choice
        options:
          - gateway-api
          - collector
          - ml-pipeline
          - dashboard
      image_tag:
        description: 'Custom image tag'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: kacperjarocki

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.image_name != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_OWNER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          IMAGE_NAME="${{ inputs.image_name }}"
          IMAGE_TAG="${{ inputs.image_tag }}"
          echo "name=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${IMAGE_NAME,,}" >> $GITHUB_OUTPUT
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: images/${{ inputs.image_name }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.name }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-matrix:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_dir: images/gateway-api
            image_name: gateway-api
          - image_dir: images/collector
            image_name: collector
          - image_dir: images/ml-pipeline
            image_name: ml-pipeline
          - image_dir: images/dashboard
            image_name: dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_OWNER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "name=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/${{ matrix.image_name }}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image_dir }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.meta.outputs.name }}:latest
            ${{ steps.meta.outputs.name }}:sha-${{ steps.meta.outputs.sha_short }}
            ${{ github.event_name == 'pull_request' && format('{0}:pr-{1}', steps.meta.outputs.name, github.event.number) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
