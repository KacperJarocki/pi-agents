name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'images/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_dir: images/gateway-api
            image_name: gateway-api
          - image_dir: images/collector
            image_name: collector
          - image_dir: images/ml-pipeline
            image_name: ml-pipeline
          - image_dir: images/dashboard
            image_name: dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image_name
        env:
          IMAGE_NAME: ${{ matrix.image_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          REPO_OWNER_LOWER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME_LOWER=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "name=${REPO_OWNER_LOWER}/${IMAGE_NAME_LOWER}" >> $GITHUB_OUTPUT
          echo "Image: ghcr.io/${REPO_OWNER_LOWER}/${IMAGE_NAME_LOWER}"

      - name: Build and push
        env:
          IMAGE_NAME: ${{ steps.image_name.outputs.name }}
          SHA_SHORT: ${{ github.sha }}
        run: |
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          echo "Building and pushing multi-platform Docker image"
          echo "From directory: ${{ matrix.image_dir }}"
          echo "To: ghcr.io/${IMAGE_NAME}"
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR build: build-only (no push)"
            docker buildx build \
              --platform linux/amd64 \
              --tag "ghcr.io/${REPO_OWNER_LOWER}/${{ matrix.image_name }}:pr-${{ github.event.number }}" \
              --load \
              "${{ matrix.image_dir }}"
          else
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "ghcr.io/${REPO_OWNER_LOWER}/${{ matrix.image_name }}:latest" \
              --tag "ghcr.io/${REPO_OWNER_LOWER}/${{ matrix.image_name }}:sha-${SHA_SHORT:0:8}" \
              --push \
              "${{ matrix.image_dir }}"
          fi

      - name: Display build success
        env:
          IMAGE_NAME: ${{ matrix.image_name }}
          SHA_SHORT: ${{ github.sha }}
        run: |
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "Multi-platform Docker image built and pushed successfully!"
          echo "Image: ghcr.io/${REPO_OWNER_LOWER}/${IMAGE_NAME}:latest"
          echo "Image: ghcr.io/${REPO_OWNER_LOWER}/${IMAGE_NAME}:sha-${SHA_SHORT:0:8}"
          echo "Platforms: linux/amd64, linux/arm64"
