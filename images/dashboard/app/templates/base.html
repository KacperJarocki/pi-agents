<!DOCTYPE html>
<html lang="en" data-theme="iot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IoT Security Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/dist.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="text-slate-100 font-mono min-h-screen"
      x-data="{ wsStatus: 'connecting' }"
      x-init="$store.ws.init()">

<!-- Toast container (Alpine) -->
<div id="alert-toast"
     x-data
     class="fixed top-[68px] right-5 z-[9999] flex flex-col gap-1.5 max-w-[370px]">
    <template x-for="(t, i) in $store.toast.items" :key="t.id">
        <div class="toast-item"
             :class="{ 'warning': t.severity !== 'critical', 'dismissing': t.dismissing }"
             @click="$store.toast.dismiss(t.id)">
            <div class="flex items-start justify-between gap-2">
                <div>
                    <div class="font-semibold text-sm"
                         :class="t.severity === 'critical' ? 'text-red-400' : 'text-amber-400'">
                        <span x-text="t.severity === 'critical' ? '\ud83d\udd34' : '\ud83d\udfe1'"></span>
                        <span x-text="t.alertType.replace(/_/g, ' ')"></span>
                    </div>
                    <div x-show="t.title" class="text-xs text-gray-300 mt-0.5 truncate" x-text="t.title"></div>
                    <div x-show="t.device" class="text-xs text-gray-500 mt-0.5" x-text="t.device"></div>
                </div>
                <button @click.stop="$store.toast.dismiss(t.id)"
                        class="text-gray-500 hover:text-white text-lg leading-none ml-2 flex-shrink-0">&times;</button>
            </div>
        </div>
    </template>
</div>

<!-- Nav -->
<nav class="bg-black/30 backdrop-blur-sm border-b border-white/10 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div id="status-indicator" class="w-3 h-3 rounded-full bg-success"></div>
            <h1 class="text-xl font-bold">
                <a href="/" class="hover:text-white">IoT Security Dashboard</a>
            </h1>
        </div>
        <div class="flex items-center gap-5">
            {% block nav_links %}
            <a href="/gateway" class="text-sm text-gray-300 hover:text-white">Gateway WiFi</a>
            {% endblock %}
            <div class="text-sm flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full inline-block"
                      :class="{
                          'bg-green-400': $store.ws.status === 'connected',
                          'bg-yellow-400': $store.ws.status === 'reconnecting',
                          'bg-gray-500': $store.ws.status !== 'connected' && $store.ws.status !== 'reconnecting'
                      }"></span>
                <span class="text-sm"
                      :class="{
                          'text-green-400': $store.ws.status === 'connected',
                          'text-yellow-400': $store.ws.status === 'reconnecting',
                          'text-gray-400': $store.ws.status !== 'connected' && $store.ws.status !== 'reconnecting'
                      }"
                      x-text="$store.ws.status === 'connected' ? 'Live' : $store.ws.status === 'reconnecting' ? 'Reconnecting\u2026' : 'Disconnected'">
                </span>
            </div>
            <div class="text-sm text-gray-400" x-data="{ time: '--:--:--' }"
                 x-init="setInterval(() => time = new Date().toLocaleTimeString(), 1000); time = new Date().toLocaleTimeString()"
                 x-text="time"></div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
    {% block content %}{% endblock %}
</main>

<script src="/static/chart.umd.min.js"></script>
<script>
    /* ── XSS escape helper ── */
    const _escDiv = document.createElement('div');
    function esc(str) {
        _escDiv.textContent = String(str == null ? '' : str);
        return _escDiv.innerHTML;
    }

    /* ── Alpine stores ── */
    document.addEventListener('alpine:init', () => {
        /* Toast store */
        Alpine.store('toast', {
            items: [],
            _nextId: 0,
            show(alert) {
                const id = ++this._nextId;
                this.items.unshift({
                    id,
                    severity: alert.severity || 'warning',
                    alertType: alert.alert_type || alert.anomaly_type || 'Alert',
                    title: alert.title || alert.description || '',
                    device: alert.device_hostname || alert.device_ip || '',
                    dismissing: false,
                });
                setTimeout(() => this.dismiss(id), 10000);
            },
            dismiss(id) {
                const item = this.items.find(t => t.id === id);
                if (item) {
                    item.dismissing = true;
                    setTimeout(() => {
                        this.items = this.items.filter(t => t.id !== id);
                    }, 400);
                }
            },
        });

        /* WebSocket store */
        Alpine.store('ws', {
            status: 'connecting',
            _backoff: 1000,
            init() {
                this._connect();
            },
            _connect() {
                const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/alerts`;
                const ws = new WebSocket(wsUrl);
                ws.onopen = () => { this.status = 'connected'; this._backoff = 1000; };
                ws.onmessage = (event) => {
                    let msg;
                    try { msg = JSON.parse(event.data); } catch { return; }
                    if ((msg.type === 'new_alerts' || msg.type === 'new_anomalies') && Array.isArray(msg.data)) {
                        msg.data.forEach(a => Alpine.store('toast').show(a));
                        /* Trigger HTMX refresh if feeds exist */
                        const feed = document.getElementById('alerts-feed');
                        if (feed) htmx.trigger(feed, 'load');
                        if (typeof loadMetrics === 'function') loadMetrics();
                    }
                };
                ws.onclose = () => {
                    this.status = 'reconnecting';
                    setTimeout(() => this._connect(), this._backoff);
                    this._backoff = Math.min(this._backoff * 2, 30000);
                };
                ws.onerror = () => ws.close();
            },
        });
    });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
