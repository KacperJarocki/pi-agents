<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Security Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        success: '#22c55e',
                        dark: '#1a1a2e',
                        card: '#16213e',
                    }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }

        .device-card {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 0.85rem;
            transition: all 0.25s ease;
        }
        .device-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
        .risk-critical { border-left: 4px solid #ef4444; }
        .risk-warning  { border-left: 4px solid #f59e0b; }
        .risk-ok       { border-left: 4px solid #22c55e; }
        .risk-bar { background: rgba(255,255,255,0.1); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 0.5rem; }
        .risk-fill { background: linear-gradient(90deg,#22c55e,#f59e0b,#ef4444); height: 100%; transition: width 0.5s ease; }

        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.12), rgba(255,255,255,0.06));
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        .timeline-bar { flex:1; display:flex; flex-direction:column; align-items:center; min-width:28px; }
        .bar-container { height:100px; width:100%; display:flex; flex-direction:column; justify-content:flex-end; position:relative; }
        .bar-fill { background:linear-gradient(180deg,#3b82f6,#1d4ed8); border-radius:4px 4px 0 0; width:100%; transition:height 0.3s ease; }
        .bar-label { font-size:9px; color:#9ca3af; margin-top:3px; }
        .anomaly-dot { position:absolute; top:0; width:7px; height:7px; background:#ef4444; border-radius:50%; left:50%; transform:translateX(-50%); }

        .talker-bar { flex:1; background:rgba(255,255,255,0.1); border-radius:4px; height:7px; overflow:hidden; }
        .talker-fill { background:linear-gradient(90deg,#3b82f6,#8b5cf6); height:100%; transition:width 0.5s ease; }
        .talker-row.suspicious { background:rgba(239,68,68,0.08); border-radius:6px; padding:0.35rem; margin:-0.35rem; }

        .tab-active   { background:rgba(59,130,246,0.25); border-bottom:2px solid #3b82f6; color:#93c5fd; }
        .tab-inactive:hover { background:rgba(255,255,255,0.05); }

        @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
        .pulse-critical { animation:pulse-red 2s infinite; }

        /* Toast */
        #alert-toast { position:fixed; top:68px; right:1.25rem; z-index:9999; display:flex; flex-direction:column; gap:0.4rem; max-width:370px; }
        .toast-item {
            background:rgba(12,12,28,0.97);
            border:1px solid rgba(239,68,68,.55);
            border-left:4px solid #ef4444;
            border-radius:9px; padding:0.7rem 0.9rem;
            box-shadow:0 4px 20px rgba(0,0,0,.5);
            animation:slideIn .3s ease; cursor:pointer;
        }
        .toast-item.warning { border-color:rgba(245,158,11,.55); border-left-color:#f59e0b; }
        @keyframes slideIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes fadeOut  { to{opacity:0;transform:translateX(120%)} }
        .toast-item.dismissing { animation:fadeOut .4s ease forwards; }
    </style>
</head>
<body class="text-white">

<div id="alert-toast"></div>

<!-- Nav -->
<nav class="bg-dark/80 backdrop-blur-sm border-b border-white/10 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div id="status-indicator" class="w-3 h-3 rounded-full bg-success"></div>
            <h1 class="text-xl font-bold">IoT Security Dashboard</h1>
        </div>
        <div class="flex items-center gap-5">
            <a href="/gateway" class="text-sm text-gray-300 hover:text-white">Gateway WiFi</a>
            <div class="text-sm flex items-center gap-1.5">
                <span id="ws-dot" class="w-2 h-2 rounded-full bg-gray-500 inline-block"></span>
                <span id="ws-label" class="text-gray-400">Connecting…</span>
            </div>
            <div class="text-sm text-gray-400" id="current-time">--:--:--</div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- Metric cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-card rounded-xl p-4 border border-white/10">
            <div class="text-xs text-gray-400 mb-1">Total Devices</div>
            <div class="text-3xl font-bold" id="metric-devices">-</div>
        </div>
        <div class="bg-card rounded-xl p-4 border border-white/10">
            <div class="text-xs text-gray-400 mb-1">Active Now</div>
            <div class="text-3xl font-bold text-green-400" id="metric-active">-</div>
        </div>
        <div class="bg-card rounded-xl p-4 border border-white/10">
            <div class="text-xs text-gray-400 mb-1">Alerts (24 h)</div>
            <div class="text-3xl font-bold text-yellow-400" id="metric-alerts">-</div>
            <div class="text-xs text-gray-500 mt-1">
                <span id="metric-ml">-</span> ML &nbsp;+&nbsp; <span id="metric-heuristic">-</span> heuristic
            </div>
        </div>
        <div class="bg-card rounded-xl p-4 border border-white/10">
            <div class="text-xs text-gray-400 mb-1">Critical (24 h)</div>
            <div class="text-3xl font-bold text-red-400" id="metric-critical">-</div>
        </div>
    </div>

    <!-- Unified alert feed (full width) -->
    <div class="bg-card rounded-xl border border-white/10 overflow-hidden">
        <div class="flex items-center justify-between px-5 py-3 border-b border-white/10">
            <h2 class="font-semibold flex items-center gap-2 text-sm">
                <span class="w-2 h-2 rounded-full bg-red-500 pulse-critical"></span>
                Recent Alerts
            </h2>
            <span class="text-xs text-gray-400">last 24 h &nbsp;·&nbsp; auto-refresh 30 s</span>
        </div>
        <!-- HTMX-managed list; will be replaced in full on each refresh -->
        <div id="alerts-feed"
             hx-get="/partial/alerts?limit=50&since_hours=24"
             hx-trigger="load, every 30s"
             hx-swap="innerHTML"
             class="divide-y divide-white/5 max-h-96 overflow-y-auto">
            <!-- skeleton while loading -->
            <div class="skeleton h-12 m-4 rounded-lg"></div>
            <div class="skeleton h-12 m-4 rounded-lg"></div>
            <div class="skeleton h-12 m-4 rounded-lg"></div>
        </div>
    </div>

    <!-- Alert Timeline (Chart.js) -->
    <div class="bg-card rounded-xl border border-white/10 overflow-hidden">
        <div class="flex items-center justify-between px-5 py-3 border-b border-white/10">
            <h2 class="font-semibold text-sm">Alert Timeline</h2>
            <span class="text-xs text-gray-400">last 24 h</span>
        </div>
        <div class="p-4" style="height:220px">
            <canvas id="alert-timeline-chart"></canvas>
        </div>
    </div>

    <!-- Tabbed panel: Devices / Timeline / Top Talkers -->
    <div class="bg-card rounded-xl border border-white/10 overflow-hidden">
        <div class="flex border-b border-white/10">
            <button class="tab-active px-5 py-3 text-sm font-medium transition-colors"
                    onclick="showTab('devices')">Devices</button>
            <button class="tab-inactive px-5 py-3 text-sm font-medium transition-colors"
                    onclick="showTab('timeline')">Timeline</button>
            <button class="tab-inactive px-5 py-3 text-sm font-medium transition-colors"
                    onclick="showTab('talkers')">Top Talkers</button>
        </div>
        <div id="tab-content" class="p-4">
            <div id="devices-tab" class="tab-panel">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3"
                     hx-get="/partial/devices"
                     hx-trigger="load, every 30s"
                     hx-swap="innerHTML">
                    <div class="device-card skeleton h-32"></div>
                    <div class="device-card skeleton h-32"></div>
                    <div class="device-card skeleton h-32"></div>
                </div>
            </div>
            <div id="timeline-tab" class="tab-panel hidden">
                <div class="flex gap-1 items-end h-32"
                     hx-get="/partial/timeline"
                     hx-trigger="load, every 30s"
                     hx-swap="innerHTML">
                </div>
            </div>
            <div id="talkers-tab" class="tab-panel hidden">
                <div hx-get="/partial/top-talkers"
                     hx-trigger="load, every 30s"
                     hx-swap="innerHTML">
                </div>
            </div>
        </div>
    </div>

</main>

<script src="/static/chart.umd.min.js"></script>
<script>
    /* ── XSS escape helper ── */
    const _escDiv = document.createElement('div');
    function esc(str) {
        _escDiv.textContent = String(str == null ? '' : str);
        return _escDiv.innerHTML;
    }

    /* ── Tab switching ── */
    function showTab(tabName) {
        document.querySelectorAll('.tab-panel').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('button[onclick^="showTab"]').forEach(el => {
            el.classList.remove('tab-active');
            el.classList.add('tab-inactive');
        });
        document.getElementById(tabName + '-tab').classList.remove('hidden');
        const btn = document.querySelector(`[onclick="showTab('${tabName}')"]`);
        btn.classList.add('tab-active');
        btn.classList.remove('tab-inactive');
    }

    /* ── Clock ── */
    setInterval(() => {
        document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
    }, 1000);
    document.getElementById('current-time').textContent = new Date().toLocaleTimeString();

    /* ── Metrics ── */
    async function loadMetrics() {
        try {
            const r = await fetch('/api/metrics/summary');
            const d = await r.json();
            document.getElementById('metric-devices').textContent   = d.total_devices   ?? 0;
            document.getElementById('metric-active').textContent    = d.active_devices   ?? 0;
            document.getElementById('metric-alerts').textContent    = d.total_alerts_24h ?? (d.total_anomalies_24h ?? 0);
            document.getElementById('metric-critical').textContent  = d.critical_anomalies ?? 0;
            document.getElementById('metric-ml').textContent        = d.total_anomalies_24h ?? 0;
            document.getElementById('metric-heuristic').textContent = d.behavior_alerts_24h ?? 0;

            const critical = d.critical_anomalies ?? 0;
            const total    = d.total_alerts_24h ?? d.total_anomalies_24h ?? 0;
            const ind = document.getElementById('status-indicator');
            if (critical > 0) {
                ind.className = 'w-3 h-3 rounded-full bg-red-500 pulse-critical';
            } else if (total > 0) {
                ind.className = 'w-3 h-3 rounded-full bg-yellow-400';
            } else {
                ind.className = 'w-3 h-3 rounded-full bg-green-400';
            }
        } catch (e) {
            document.getElementById('status-indicator').className = 'w-3 h-3 rounded-full bg-gray-500';
        }
    }
    setInterval(loadMetrics, 30000);
    loadMetrics();

    /* ── Toast ── */
    function showToast(alert) {
        const container = document.getElementById('alert-toast');
        const severity  = alert.severity || 'warning';
        const isCrit    = severity === 'critical';
        const alertType = alert.alert_type || alert.anomaly_type || 'Alert';
        const title     = alert.title || alert.description || '';
        const device    = alert.device_hostname || alert.device_ip || '';

        const item = document.createElement('div');
        item.className = `toast-item${isCrit ? '' : ' warning'}`;
        item.innerHTML = `
            <div class="flex items-start justify-between gap-2">
                <div>
                    <div class="font-semibold text-sm ${isCrit ? 'text-red-400' : 'text-amber-400'}">
                        ${isCrit ? '🔴' : '🟡'} ${esc(alertType.replace(/_/g,' '))}
                    </div>
                    ${title  ? `<div class="text-xs text-gray-300 mt-0.5 truncate">${esc(title)}</div>` : ''}
                    ${device ? `<div class="text-xs text-gray-500 mt-0.5">${esc(device)}</div>` : ''}
                </div>
                <button onclick="this.closest('.toast-item').remove()"
                        class="text-gray-500 hover:text-white text-lg leading-none ml-2 flex-shrink-0">&times;</button>
            </div>`;
        container.prepend(item);
        setTimeout(() => {
            item.classList.add('dismissing');
            setTimeout(() => item.remove(), 400);
        }, 10000);
    }

    /* ── WebSocket ── */
    (function connectAlerts() {
        const wsUrl  = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/alerts`;
        const dot    = document.getElementById('ws-dot');
        const label  = document.getElementById('ws-label');
        let backoff  = 1000;

        function setStatus(s) {
            if (s === 'connected') {
                dot.className = 'w-2 h-2 rounded-full bg-green-400 inline-block';
                label.textContent = 'Live'; label.className = 'text-green-400';
                backoff = 1000;
            } else if (s === 'reconnecting') {
                dot.className = 'w-2 h-2 rounded-full bg-yellow-400 inline-block';
                label.textContent = 'Reconnecting…'; label.className = 'text-yellow-400';
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-gray-500 inline-block';
                label.textContent = 'Disconnected'; label.className = 'text-gray-400';
            }
        }

        function connect() {
            const ws = new WebSocket(wsUrl);
            ws.onopen  = () => setStatus('connected');
            ws.onmessage = (event) => {
                let msg;
                try { msg = JSON.parse(event.data); } catch { return; }
                if ((msg.type === 'new_alerts' || msg.type === 'new_anomalies') && Array.isArray(msg.data)) {
                    msg.data.forEach(a => showToast(a));
                    /* force-refresh alerts feed and metrics */
                    htmx.trigger('#alerts-feed', 'load');
                    loadMetrics();
                }
            };
            ws.onclose = () => {
                setStatus('reconnecting');
                setTimeout(connect, backoff);
                backoff = Math.min(backoff * 2, 30000);
            };
            ws.onerror = () => ws.close();
        }
        connect();
    })();

    /* ── Alert Timeline Chart ── */
    let alertTimelineChart = null;
    async function loadAlertTimeline() {
        try {
            const r = await fetch('/api/alerts?limit=200&since_hours=24');
            const d = await r.json();
            const alerts = d.alerts || [];

            const warning = [];
            const critical = [];
            alerts.forEach(a => {
                const ts = new Date(a.timestamp);
                const score = Number(a.score || 0);
                const point = {x: ts.getTime(), y: score};
                if (a.severity === 'critical') critical.push(point);
                else warning.push(point);
            });

            const ctx = document.getElementById('alert-timeline-chart');
            if (alertTimelineChart) { alertTimelineChart.destroy(); }
            alertTimelineChart = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [
                        {
                            label: 'Warning',
                            data: warning,
                            backgroundColor: 'rgba(245,158,11,0.7)',
                            borderColor: 'rgba(245,158,11,1)',
                            pointRadius: 5,
                            pointHoverRadius: 7,
                        },
                        {
                            label: 'Critical',
                            data: critical,
                            backgroundColor: 'rgba(239,68,68,0.7)',
                            borderColor: 'rgba(239,68,68,1)',
                            pointRadius: 6,
                            pointHoverRadius: 8,
                        },
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#9ca3af', font: { size: 11 } } },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const t = new Date(ctx.raw.x).toLocaleTimeString();
                                    return `${ctx.dataset.label} @ ${t} — score ${ctx.raw.y.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            ticks: {
                                color: '#6b7280',
                                maxTicksLimit: 12,
                                callback: function(v) { return new Date(v).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
                            },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        },
                        y: {
                            title: { display: true, text: 'Score', color: '#9ca3af' },
                            ticks: { color: '#6b7280' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            beginAtZero: true,
                        }
                    }
                }
            });
        } catch(e) { console.warn('alert timeline error', e); }
    }
    loadAlertTimeline();
    setInterval(loadAlertTimeline, 60000);

    htmx.process(document.body);
</script>
</body>
</html>
