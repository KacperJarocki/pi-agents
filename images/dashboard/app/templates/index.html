<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Security Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        success: '#22c55e',
                        dark: '#1a1a2e',
                        card: '#16213e',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        .device-card, .anomaly-card {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s ease;
        }
        .device-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.12), rgba(255,255,255,0.06));
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .risk-critical { border-left: 4px solid #ef4444; }
        .risk-warning { border-left: 4px solid #f59e0b; }
        .risk-ok { border-left: 4px solid #22c55e; }
        .severity-critical { border-left: 4px solid #ef4444; }
        .severity-warning { border-left: 4px solid #f59e0b; }
        .risk-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .risk-fill {
            background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
            height: 100%;
            transition: width 0.5s ease;
        }
        .timeline-bar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 30px;
        }
        .bar-container {
            height: 120px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
        }
        .bar-fill {
            background: linear-gradient(180deg, #3b82f6, #1d4ed8);
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease;
            width: 100%;
        }
        .bar-label {
            font-size: 10px;
            color: #9ca3af;
            margin-top: 4px;
        }
        .anomaly-dot {
            position: absolute;
            top: 0;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
        }
        .talker-row.suspicious {
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            padding: 0.5rem;
            margin: -0.5rem;
        }
        .talker-bar {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .talker-fill {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            height: 100%;
            transition: width 0.5s ease;
        }
        .tab-active {
            background: rgba(59, 130, 246, 0.3);
            border-bottom: 2px solid #3b82f6;
        }
        .tab-inactive:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }
        .pulse-critical {
            animation: pulse-red 2s infinite;
        }

        /* Alert toast */
        #alert-toast {
            position: fixed;
            top: 70px;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 380px;
        }
        .toast-item {
            background: rgba(15, 15, 30, 0.97);
            border: 1px solid rgba(239, 68, 68, 0.6);
            border-left: 4px solid #ef4444;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
            cursor: pointer;
        }
        .toast-item.warning {
            border-color: rgba(245, 158, 11, 0.6);
            border-left-color: #f59e0b;
        }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(120%); }
        }
        .toast-item.dismissing {
            animation: fadeOut 0.4s ease forwards;
        }
    </style>
</head>
<body class="text-white">

    <!-- Real-time alert toasts -->
    <div id="alert-toast"></div>

    <nav class="bg-dark/80 backdrop-blur-sm border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="status-indicator" class="w-3 h-3 rounded-full bg-success"></div>
                    <h1 class="text-xl font-bold">IoT Security Dashboard</h1>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/gateway" class="text-sm text-gray-300 hover:text-white">Gateway WiFi</a>
                    <div id="connection-status" class="text-sm flex items-center gap-1.5">
                        <span id="ws-dot" class="w-2 h-2 rounded-full bg-gray-500 inline-block"></span>
                        <span id="ws-label" class="text-gray-400">Connecting...</span>
                    </div>
                    <div class="text-sm text-gray-400" id="current-time">
                        Loading...
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-card rounded-xl p-4 border border-white/10">
                <div class="text-sm text-gray-400">Total Devices</div>
                <div class="text-3xl font-bold" id="metric-devices">-</div>
            </div>
            <div class="bg-card rounded-xl p-4 border border-white/10">
                <div class="text-sm text-gray-400">Active Devices</div>
                <div class="text-3xl font-bold text-success" id="metric-active">-</div>
            </div>
            <div class="bg-card rounded-xl p-4 border border-white/10">
                <div class="text-sm text-gray-400">Anomalies (24h)</div>
                <div class="text-3xl font-bold text-warning" id="metric-anomalies">-</div>
            </div>
            <div class="bg-card rounded-xl p-4 border border-white/10">
                <div class="text-sm text-gray-400">Critical Alerts</div>
                <div class="text-3xl font-bold text-danger" id="metric-critical">-</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-card rounded-xl border border-white/10 overflow-hidden">
                    <div class="flex border-b border-white/10">
                        <button class="tab-active px-6 py-3 text-sm font-medium transition-colors"
                                onclick="showTab('devices')">
                            Devices
                        </button>
                        <button class="tab-inactive px-6 py-3 text-sm font-medium transition-colors"
                                onclick="showTab('timeline')">
                            Timeline
                        </button>
                        <button class="tab-inactive px-6 py-3 text-sm font-medium transition-colors"
                                onclick="showTab('talkers')">
                            Top Talkers
                        </button>
                    </div>
                    
                    <div id="tab-content" class="p-4">
                        <div id="devices-tab" class="tab-panel">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4"
                                 hx-get="/partial/devices"
                                 hx-trigger="load, every 30s"
                                  hx-swap="innerHTML">
                                <div class="device-card skeleton h-40"></div>
                                <div class="device-card skeleton h-40"></div>
                            </div>
                        </div>
                        <div id="timeline-tab" class="tab-panel hidden">
                            <div class="flex gap-2 items-end h-40"
                                 hx-get="/partial/timeline"
                                 hx-trigger="load, every 30s"
                                  hx-swap="innerHTML">
                            </div>
                        </div>
                        <div id="talkers-tab" class="tab-panel hidden">
                            <div hx-get="/partial/top-talkers"
                                 hx-trigger="load, every 30s"
                                  hx-swap="innerHTML">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="bg-card rounded-xl border border-white/10 overflow-hidden">
                    <div class="px-4 py-3 border-b border-white/10">
                        <h2 class="font-semibold flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-danger pulse-critical"></span>
                            Recent Anomalies
                        </h2>
                    </div>
                    <div class="p-4 space-y-3 max-h-96 overflow-y-auto"
                         hx-get="/partial/anomalies"
                                 hx-trigger="load, every 30s"
                                  hx-swap="innerHTML">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        /* ── Escape helper for innerHTML interpolation ── */
        const _escDiv = document.createElement('div');
        function esc(str) {
            _escDiv.textContent = String(str == null ? '' : str);
            return _escDiv.innerHTML;
        }

        /* ── Tab switching ── */
        function showTab(tabName) {
            document.querySelectorAll('.tab-panel').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('button[onclick^="showTab"]').forEach(el => {
                el.classList.remove('tab-active');
                el.classList.add('tab-inactive');
            });
            document.getElementById(tabName + '-tab').classList.remove('hidden');
            document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.add('tab-active');
            document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.remove('tab-inactive');
        }

        /* ── Clock ── */
        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        /* ── Metrics ── */
        async function loadMetrics() {
            try {
                const response = await fetch('/api/metrics/summary');
                const data = await response.json();
                document.getElementById('metric-devices').textContent = data.total_devices || 0;
                document.getElementById('metric-active').textContent = data.active_devices || 0;
                document.getElementById('metric-anomalies').textContent = data.total_anomalies_24h || 0;
                document.getElementById('metric-critical').textContent = data.critical_anomalies || 0;
                if (data.critical_anomalies > 0) {
                    document.getElementById('status-indicator').className = 'w-3 h-3 rounded-full bg-danger pulse-critical';
                } else if (data.total_anomalies_24h > 0) {
                    document.getElementById('status-indicator').className = 'w-3 h-3 rounded-full bg-warning';
                } else {
                    document.getElementById('status-indicator').className = 'w-3 h-3 rounded-full bg-success';
                }
            } catch (e) {
                console.error('Failed to load metrics:', e);
                document.getElementById('status-indicator').className = 'w-3 h-3 rounded-full bg-gray-500';
            }
        }
        setInterval(loadMetrics, 30000);
        loadMetrics();

        /* ── Toast notifications ── */
        function showToast(anomaly) {
            const container = document.getElementById('alert-toast');
            const severity = anomaly.severity || 'warning';
            const isCritical = severity === 'critical';

            const item = document.createElement('div');
            item.className = `toast-item${isCritical ? '' : ' warning'}`;
            item.innerHTML = `
                <div class="flex items-start justify-between gap-2">
                    <div>
                        <div class="font-semibold text-sm ${isCritical ? 'text-red-400' : 'text-amber-400'}">
                            ${isCritical ? '🔴' : '🟡'} ${esc(anomaly.anomaly_type || 'Anomaly Detected')}
                        </div>
                        <div class="text-xs text-gray-300 mt-0.5">${esc(anomaly.description || '')}</div>
                        <div class="text-xs text-gray-500 mt-1">score ${Number(anomaly.score || 0).toFixed(3)} &middot; ${new Date().toLocaleTimeString()}</div>
                    </div>
                    <button onclick="this.closest('.toast-item').remove()" class="text-gray-500 hover:text-white text-lg leading-none ml-2">&times;</button>
                </div>
            `;
            container.prepend(item);

            // Auto-dismiss after 10s
            setTimeout(() => {
                item.classList.add('dismissing');
                setTimeout(() => item.remove(), 400);
            }, 10000);
        }

        /* ── WebSocket alerts client ── */
        (function connectAlerts() {
            const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/alerts`;
            const dot   = document.getElementById('ws-dot');
            const label = document.getElementById('ws-label');
            let backoff  = 1000;

            function setStatus(state) {
                if (state === 'connected') {
                    dot.className   = 'w-2 h-2 rounded-full bg-green-400 inline-block';
                    label.textContent = 'Live';
                    label.className   = 'text-green-400';
                    backoff = 1000;
                } else if (state === 'reconnecting') {
                    dot.className   = 'w-2 h-2 rounded-full bg-yellow-400 inline-block';
                    label.textContent = 'Reconnecting…';
                    label.className   = 'text-yellow-400';
                } else {
                    dot.className   = 'w-2 h-2 rounded-full bg-gray-500 inline-block';
                    label.textContent = 'Disconnected';
                    label.className   = 'text-gray-400';
                }
            }

            function connect() {
                const ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    setStatus('connected');
                };

                ws.onmessage = (event) => {
                    let msg;
                    try { msg = JSON.parse(event.data); } catch { return; }

                    if (msg.type === 'new_anomalies' && Array.isArray(msg.data)) {
                        msg.data.forEach(a => showToast(a));
                        // Force-refresh the anomaly sidebar and metrics
                        htmx.trigger('[hx-get="/partial/anomalies"]', 'htmx:load');
                        loadMetrics();
                    }
                };

                ws.onclose = () => {
                    setStatus('reconnecting');
                    setTimeout(() => { connect(); }, backoff);
                    backoff = Math.min(backoff * 2, 30000);
                };

                ws.onerror = () => {
                    ws.close();
                };
            }

            connect();
        })();

        htmx.process(document.body);
    </script>
</body>
</html>
