apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-agent-access
  namespace: iot-security
spec:
  podSelector:
    matchLabels:
      app: gateway-agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Allow gateway-api to control the agent
        - podSelector:
            matchLabels:
              app: gateway-api
      ports:
        - protocol: TCP
          port: 7000
