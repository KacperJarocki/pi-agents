apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: iot-security
  labels:
    app: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      nodeSelector:
        node-role.kubernetes.io/gateway: "true"
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: collector
          image: ghcr.io/kacperjarocki/collector:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          env:
            - name: DATABASE_PATH
              value: "/data/iot-security.db"
            - name: INTERFACE
              value: "wlan0"
            - name: LOG_LEVEL
              value: "info"
            - name: BATCH_SIZE
              value: "25"
            - name: CAPTURE_PACKET_COUNT
              value: "25"
            - name: CAPTURE_TIMEOUT
              value: "5"
            - name: LAN_SUBNET_CIDR
              value: "192.168.50.0/24"
            - name: LEASE_FILE_PATH
              value: "/gateway-state/dnsmasq.leases"
            - name: ENABLE_METRICS
              value: "false"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: gateway-state
              mountPath: /gateway-state
              readOnly: true
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "ip link show \"$INTERFACE\" >/dev/null 2>&1"
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: iot-security-sqlite
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 50Mi
        - name: gateway-state
          hostPath:
            path: /var/lib/gateway-agent
            type: DirectoryOrCreate
