apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-agent
  namespace: iot-security
  labels:
    app: gateway-agent
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: gateway-agent
  template:
    metadata:
      labels:
        app: gateway-agent
    spec:
      terminationGracePeriodSeconds: 20
      nodeSelector:
        node-role.kubernetes.io/gateway: "true"
      hostNetwork: true
      hostPID: true
      containers:
        - name: gateway-agent
          image: ghcr.io/kacperjarocki/gateway-agent:latest
          imagePullPolicy: Always
          env:
            # Safety rail: keep OFF by default.
            - name: ENABLE_APPLY
              value: "false"
            - name: AUTO_RESTORE
              value: "true"
            - name: STATE_DIR
              value: "/data"
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 3
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - "sleep 5"
          volumeMounts:
            - name: state
              mountPath: /data
              readOnly: false
      volumes:
        - name: state
          hostPath:
            path: /var/lib/gateway-agent
            type: DirectoryOrCreate
