apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference
  namespace: iot-security
  labels:
    app: ml-pipeline
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-pipeline
      component: inference
  template:
    metadata:
      labels:
        app: ml-pipeline
        component: inference
    spec:
      nodeSelector:
        node-role.kubernetes.io/gateway: "true"
      containers:
        - name: ml-inference
          image: ghcr.io/kacperjarocki/ml-pipeline:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - app.inference
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: DATABASE_PATH
              value: "/data/iot-security.db"
            - name: MODEL_PATH
              value: "/data/models"
            - name: LOG_LEVEL
              value: "info"
            - name: INFERENCE_INTERVAL
              value: "60"
            - name: INFERENCE_HOURS
              value: "24"
            - name: BEHAVIOR_BASELINE_HOURS
              value: "168"
            - name: FEATURE_BUCKET_MINUTES
              value: "2"
            - name: PER_DEVICE_MODELS
              value: "true"
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: iot-security-sqlite
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
