apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-api-job-manager
  namespace: iot-security
  labels:
    app: gateway-api
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-api-job-manager
  namespace: iot-security
  labels:
    app: gateway-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-api-job-manager
subjects:
  - kind: ServiceAccount
    name: gateway-api
    namespace: iot-security
