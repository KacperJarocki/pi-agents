apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-trainer
  namespace: iot-security
  labels:
    app: ml-pipeline
    component: trainer
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ml-pipeline
            component: trainer
        spec:
          nodeSelector:
            node-role.kubernetes.io/gateway: "true"
          restartPolicy: OnFailure
          containers:
            - name: ml-trainer
              image: ghcr.io/kacperjarocki/ml-pipeline:latest
              imagePullPolicy: Always
              command:
                - python
                - -m
                - app.train
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              env:
                - name: DATABASE_PATH
                  value: "/data/iot-security.db"
                - name: MODEL_PATH
                  value: "/data/models"
                - name: LOG_LEVEL
                  value: "info"
              volumeMounts:
                - name: sqlite-data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: sqlite-data
              persistentVolumeClaim:
                claimName: iot-security-sqlite
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 100Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
